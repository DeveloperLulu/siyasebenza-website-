<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking - Siyasebenza Investment</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header><h1>Book Equipment</h1></header>
    <nav>
      <a href="home.html">Home</a>
      <a href="services.html">Services</a>
      <a href="gallery.html">Gallery</a>
      <a href="booking.html">Booking</a>
      <a href="contact page.html">Contact Us</a>
      <a href="Rates.html"> Rates</a>
    </nav>
    <section class="section">
      <h2>Booking Form</h2>
      <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="service">Select Equipment:</label>
        <select id="service" name="service" required>
          <option value="tipper">12 Cube Tipper Truck</option>
          <option value="excavator">Excavator</option>
        </select>

        <label for="date">Preferred Date:</label>
        <input type="date" id="date" name="date" required />

        <label for="message">Additional Details:</label>
        <textarea id="message" name="message" rows="5"></textarea>

        <button type="submit">Submit Booking</button>
      </form>
    </section>
    <footer><p>&copy; 2026 Siyasebenza Investment</p></footer>
  </body>
</html>
